<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Test - fawks.ai</title>
</head>
<body style="background: #f0f2f5; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;">
    <div style="text-align: center;">
        <h1 style="color: #1e293b;">Widget Testing Page</h1>
        <p style="color: #64748b;">The chat widget should appear in the bottom right.</p>
    </div>

    <!-- AI CHAT WIDGET -->
<script>
(function() {
  var c = {
    hook: "https://backend.fawks.ai/webhook/27726c0b-c116-4a04-82b7-63dc39e97dc6/chat",
    widgetId: "we-xelerate-test",
    name: "weXelerate",
    sub: "ONLINE AND READY TO HELP",
    logo: "https://wexelerate.com/wp-content/uploads/2022/03/wexelerate-logo-square.png",
    color: "#4fbdf0",
    botBg: "#ffffff",
    botTxt: "#1F2937",
    usrBg: "#4fbdf0",
    usrTxt: "#FFFFFF",
    msg: "Welcome to weXelerate. We offer event spaces, offices, co-working, and membership options. How can I help you today?",
    hold: "Type a message...",
    foot: "POWERED BY AI FAWKS AI",
    link: "https://fawks.ai",
    rad: "16px",
    pos: "right",
    prompts: ["What event spaces do you have?", "I want to book an office", "Pricing details"],
    showBranding: true,
    autoOpen: 0
  };

  var init = function() {
    if (!document.body) return setTimeout(init, 100);
    if (document.getElementById('ai-chat-wrapper')) return;
    var root = document.createElement('div');
    root.id = 'ai-chat-wrapper';
    document.body.appendChild(root);

    var sId = localStorage.getItem('chat_session_' + c.widgetId);
    if (!sId) {
      sId = 'sess_' + Math.random().toString(36).substring(2, 15);
      localStorage.setItem('chat_session_' + c.widgetId, sId);
    }

    var s = document.createElement('style');
    s.textContent = [
      '#ai-chat-wrapper{--p:'+c.color+';--r:'+c.rad+';font-family:system-ui,sans-serif;position:relative;z-index:999999}',
      '.rc-l{position:fixed;bottom:20px;'+c.pos+':20px;width:60px;height:60px;background:var(--p);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 24px rgba(0,0,0,.2);z-index:999999;overflow:hidden;transition:transform .3s}',
      '.rc-l:hover{transform:scale(1.1)}',
      '.rc-l img{width:100%;height:100%;object-fit:cover}',
      '.rc-w{position:fixed;bottom:90px;'+c.pos+':20px;width:400px;height:600px;max-height:85vh;background:#fff;border-radius:var(--r);box-shadow:0 24px 64px rgba(0,0,0,.15);display:none;flex-direction:column;overflow:hidden;z-index:999999}',
      '.rc-w.o{display:flex;animation:rcFadeUp .3s ease-out}',
      '@keyframes rcFadeUp{from{opacity:0;transform:translateY(20px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}',
      '.rc-h{background:var(--p);padding:16px 20px;color:#fff;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}',
      '.rc-h-main{display:flex;align-items:center;gap:12px}',
      '.rc-h-logo{width:36px;height:36px;border-radius:10px;background:#fff;object-fit:cover;border:1px solid rgba(255,255,255,.2)}',
      '.rc-h-titles{display:flex;flex-direction:column;text-align:left}',
      '.rc-h-title{margin:0;font-size:15px;font-weight:800;line-height:1.1}',
      '.rc-h-sub{margin:0;font-size:10px;opacity:.8;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:3px}',
      '.rc-m{flex:1;overflow-y:auto;padding:16px;background:#f8fafc;display:flex;flex-direction:column;scroll-behavior:smooth;gap:12px}',
      '.rc-hero{text-align:center;margin:auto 0;padding:20px;animation:rcFadeIn .5s ease-out}',
      '@keyframes rcFadeIn{from{opacity:0}to{opacity:1}}',
      '.rc-hero img{width:64px;height:64px;border-radius:16px;margin-bottom:15px;box-shadow:0 8px 24px rgba(0,0,0,.1);object-fit:cover;border:2px solid #fff}',
      '.rc-hero h3{margin:0 0 10px;font-size:18px;color:#0f172a;font-weight:800}',
      '.rc-hero p{font-size:14px;color:#64748b;line-height:1.5;margin-bottom:24px;font-weight:500}',
      '.rc-btn{display:block;width:100%;background:#fff;border:1px solid #e2e8f0;padding:12px 16px;border-radius:12px;margin-bottom:8px;font-size:13px;font-weight:600;cursor:pointer;text-align:left;transition:.2s;box-shadow:0 2px 4px rgba(0,0,0,.02)}',
      '.rc-btn:hover{border-color:var(--p);color:var(--p);transform:translateY(-1px)}',
      '.rc-msg-row{display:flex;align-items:flex-end;animation:rcSlideIn .3s ease-out;margin-bottom:4px}',
      '@keyframes rcSlideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}',
      '.rc-row-bot{justify-content:flex-start}',
      '.rc-row-usr{justify-content:flex-end}',
      '.rc-msg-avatar{width:28px;height:28px;border-radius:8px;margin-right:8px;border:1px solid #eee;background:#fff;object-fit:cover;flex-shrink:0;margin-bottom:2px}',
      '.rc-msg{max-width:85%;padding:12px 16px;font-size:14px;border-radius:var(--r);line-height:1.6;word-wrap:break-word;overflow-x:auto}',
      '.rc-m-bot{background:'+c.botBg+';color:'+c.botTxt+';border:1px solid #e2e8f0;border-bottom-left-radius:4px}',
      '.rc-m-usr{background:'+c.usrBg+';color:'+c.usrTxt+';border-bottom-right-radius:4px}',
      '.rc-msg strong{font-weight:700}.rc-msg em{font-style:italic}',
      '.rc-msg code{background:rgba(0,0,0,.07);padding:2px 6px;border-radius:4px;font-family:monospace;font-size:13px}',
      '.rc-msg pre{background:rgba(0,0,0,.07);padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0}',
      '.rc-msg pre code{background:none;padding:0}',
      '.rc-msg a{color:var(--p);text-decoration:underline;font-weight:600}',
      '.rc-msg table{border-collapse:collapse;width:100%;margin:12px 0;font-size:13px;background:rgba(0,0,0,0.02);border-radius:8px;overflow:hidden;border:1px solid #e2e8f0}',
      '.rc-msg th,.rc-msg td{border:1px solid #e2e8f0;padding:8px 12px;text-align:left}',
      '.rc-msg th{background:rgba(0,0,0,0.04);font-weight:700}',
      '.rc-msg ul, .rc-msg ol{margin:8px 0;padding-left:24px}',
      '.rc-msg li{margin:4px 0}',
      '.rc-msg h1, .rc-msg h2, .rc-msg h3{margin:12px 0 8px;font-weight:800;line-height:1.2}',
      '.rc-msg h1{font-size:1.4em}.rc-msg h2{font-size:1.2em}.rc-msg h3{font-size:1.1em}',
      '.rc-typing{display:flex;gap:4px;padding:14px 18px!important}',
      '.rc-typing span{width:6px;height:6px;background:#94a3b8;border-radius:50%;animation:rcBounce 1.4s infinite ease-in-out}',
      '.rc-typing span:nth-child(2){animation-delay:.2s}',
      '.rc-typing span:nth-child(3){animation-delay:.4s}',
      '@keyframes rcBounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}',
      '.rc-f{padding:12px 16px;border-top:1px solid #f1f5f9;background:#fff;flex-shrink:0}',
      '.rc-i{display:flex;gap:8px;background:#f1f5f9;padding:4px;border-radius:12px;border:1px solid #e2e8f0}',
      '.rc-in{flex:1;border:none;background:transparent;padding:10px 12px;outline:none;font-size:14px;color:#1e293b}',
      '.rc-go{background:var(--p);border:none;width:36px;height:36px;border-radius:10px;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;transition:.2s}',
      '.rc-go:hover{transform:scale(1.05)}',
      '.rc-pwr{text-align:center;font-size:9px;color:#94a3b8;margin-top:8px;text-transform:uppercase;font-weight:800;letter-spacing:1px}',
      '.rc-pwr a{color:inherit;text-decoration:none;opacity:.8}',
      '.rc-pwr a:hover{opacity:1;color:var(--p)}',
      '@media(max-width:480px){.rc-w{width:calc(100vw - 20px)!important;height:85vh!important;bottom:80px!important;left:10px!important;right:10px!important}}'
    ].join('');
    root.appendChild(s);

    var lch = document.createElement('div');
    lch.className = 'rc-l';
    lch.innerHTML = c.logo ? '<img src="'+c.logo+'">' : '<svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>';

    var win = document.createElement('div');
    win.className = 'rc-w';
    win.innerHTML = '<div class="rc-h"><div class="rc-h-main"><img class="rc-h-logo" src="'+c.logo+'"><div class="rc-h-titles"><b class="rc-h-title">'+c.name+'</b><span class="rc-h-sub">'+c.sub+'</span></div></div><span id="rc-cx" style="cursor:pointer;font-size:28px;opacity:.6;line-height:1">&times;</span></div><div class="rc-m" id="rc-ms"><div class="rc-hero" id="rc-hr"><img src="'+c.logo+'"><h3>Welcome to '+c.name+'</h3><p>'+c.msg+'</p><div id="rc-ps"></div></div></div><div class="rc-f"><div class="rc-i"><input class="rc-in" id="rc-in" placeholder="'+c.hold+'" autocomplete="off"><button class="rc-go" id="rc-go"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button></div>'+(c.showBranding ? '<div class="rc-pwr"><a href="'+c.link+'" target="_blank">'+c.foot+'</a></div>' : '')+'</div>';

    root.appendChild(lch);
    root.appendChild(win);

    var ms = document.getElementById('rc-ms');
    var hr = document.getElementById('rc-hr');
    var inp = document.getElementById('rc-in');

    if (c.prompts && c.prompts.length > 0) {
      c.prompts.forEach(function(p) {
        var b = document.createElement('button');
        b.className = 'rc-btn';
        b.textContent = p;
        b.onclick = function() { send(p); };
        document.getElementById('rc-ps').appendChild(b);
      });
    }

    var parseMD = function(str) {
      try {
        if (!str) return '';
        var b = String.fromCharCode(96);
        var html = str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        /* Code */
        html = html.replace(new RegExp(b+b+b+'([\\s\\S]*?)'+b+b+b, 'g'), '<pre><code>$1</code></pre>');
        html = html.replace(new RegExp(b+'([^'+b+'\\n]+)'+b, 'g'), '<code>$1</code>');
        /* Tables */
        if (html.indexOf('|') !== -1) {
          html = html.replace(/^\|(.+)\|\n\|([-: ]+)\|\n((?:\|.+\|(?:\n|$))+)/gm, function(m, head, d, body) {
            var rows = body.trim().split('\n').map(function(r) { return '<tr>' + r.split('|').filter(Boolean).map(function(cell) { return '<td>'+cell.trim()+'</td>'; }).join('') + '</tr>'; }).join('');
            var ths = '<tr>' + head.split('|').filter(Boolean).map(function(cell) { return '<th>'+cell.trim()+'</th>'; }).join('') + '</tr>';
            return '<table><thead>'+ths+'</thead><tbody>'+rows+'</tbody></table>';
          });
        }
        /* Headlines */
        html = html.replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>');
        /* Bold/Italic */
        html = html.replace(/\*\*\*([^*]+)\*\*\*/g,'<strong><em>$1</em></strong>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*\n]+)\*/g,'<em>$1</em>').replace(/__([^_]+)__/g,'<strong>$1</strong>').replace(/_([^_\n]+)_/g,'<em>$1</em>');
        /* Quotes/Lists */
        html = html.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>').replace(/^([-*_]{3,})$/gm,'<hr>').replace(/^[\*\-] (.+)$/gm,'<li>$1</li>');
        html = html.replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>').replace(/<\/ul>\s*<ul>/g,'');
        /* Links */
        html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
        html = html.replace(/(https?:\/\/[^\s<>"]+)/g, function(match, p1, offset, string) {
          var p = string.substring(offset - 2, offset); if (p === '="' || p === "='") return match;
          var l = match.match(/[.,!?;:]+$/); var cu = l ? match.substring(0, match.length - l[0].length) : match;
          return '<a href="'+cu+'" target="_blank">'+cu+'</a>' + (l ? l[0] : '');
        });
        return html.replace(/\r?\n/g,'<br>');
      } catch (e) { console.error('MD Error:', e); return str; }
    };

    var add = function(t, bot) {
      if (hr) hr.style.display = 'none';
      var row = document.createElement('div');
      row.className = 'rc-msg-row rc-row-' + (bot ? 'bot' : 'usr');
      var out = bot ? parseMD(t) : t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      row.innerHTML = bot ? '<img src="'+c.logo+'" class="rc-msg-avatar"><div class="rc-msg rc-m-bot">'+out+'</div>' : '<div class="rc-msg rc-m-usr">'+out+'</div>';
      ms.appendChild(row); ms.scrollTop = ms.scrollHeight;
    };

    var showType = function() {
      if (document.getElementById('rc-typ')) return;
      var row = document.createElement('div');
      row.id = 'rc-typ';
      row.className = 'rc-msg-row rc-row-bot';
      row.innerHTML = '<img src="' + c.logo + '" class="rc-msg-avatar"><div class="rc-msg rc-m-bot rc-typing"><span></span><span></span><span></span></div>';
      ms.appendChild(row);
      ms.scrollTop = ms.scrollHeight;
    };

    var hideType = function() {
      var el = document.getElementById('rc-typ');
      if (el) el.remove();
    };

    var send = function(t) {
      if (!t || !t.trim()) return;
      var clean = t.trim(); add(clean, false); inp.value = ''; showType();
      fetch(c.hook, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        mode: 'cors',
        body: JSON.stringify({ message: clean, sessionId: sId, widgetId: c.widgetId, chatInput: clean })
      }).then(function(r) { 
        if (!r.ok) throw new Error('Network response was not ok');
        return r.text(); 
      }).then(function(txt) {
        hideType();
        try {
          var d; try { d = JSON.parse(txt); } catch(e) { d = txt; }
          var res;
          if (d && typeof d === 'object') {
            if (Array.isArray(d)) {
              var f = d[0];
              res = f ? (f.output || f.text || f.message || f.response || f.answer || JSON.stringify(f)) : 'No response.';
            } else {
              res = d.output || d.text || d.message || d.response || d.answer || d.result || (d.error ? 'Error: ' + d.error : JSON.stringify(d));
            }
          } else { res = d || 'Response received.'; }
          add(String(res), true);
        } catch (e) {
          console.error('Process Error:', e);
          add('Error processing AI response. Please try again.', true);
        }
      }).catch(function(err) {
        console.error('Widget Connection Error:', err);
        hideType(); 
        var m = 'Connection error. Please check your n8n workflow or CORS settings.';
        if (String(err).indexOf('TypeError') !== -1) m = 'Unable to connect to AI server. Please check your internet or firewall.';
        add(m, true);
      });
    };

    lch.onclick = function() { win.classList.toggle('o'); if (win.classList.contains('o')) { setTimeout(function() { inp.focus(); }, 100); } };
    document.getElementById('rc-cx').onclick = function(e) { e.stopPropagation(); win.classList.remove('o'); };
    document.getElementById('rc-go').onclick = function() { send(inp.value); };
    inp.onkeydown = function(e) { if (e.key === 'Enter') send(inp.value); };
    if (c.autoOpen > 0) { setTimeout(function() { if (!win.classList.contains('o')) win.classList.add('o'); }, c.autoOpen * 1000); }
  };
  init();
})();
</script>
</body>
</html>
